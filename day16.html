<!DOCTYPE html>
<html>
<head>
  <title>Class vs ID</title>
  <style>
    .red {  /* class = . se shuru, ye group ke liye */
      background-color: red;
      width: 100px;
      height: 100px;
      margin: 10px;
    }
    
    #bigbox {  /* id = # se shuru, ye akela special ke liye */
      background-color: blue;
      width: 200px;
      height: 200px;
    }
  </style>
</head>
<body>
  <div class="red"></div>
  <div class="red"></div>
  <div class="red"></div>
  
  <div id="bigbox"></div>
</body>
</html>
